<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Good Morning, Max</title>
  <style>
    :root {
      --bg: #F7F7F7;
      --card: #FFFFFF;
      --text: #111111;
      --soft: #6B7280;
      --border: #E5E7EB;
      --check: #16A34A;
      --check-light: #DCFCE7;
      --streak: #EA580C;
      --streak-bg: #FFF7ED;
      --blue: #2563EB;
      --blue-bg: #EFF6FF;
      --red: #DC2626;
      --r: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: calc(env(safe-area-inset-bottom) + 32px);
    }

    /* HEADER */
    .header {
      background: var(--card);
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .date-line { font-size:12px; color:var(--soft); font-weight:600; letter-spacing:.06em; text-transform:uppercase; margin-bottom:3px; }
    .greeting { font-size:24px; font-weight:700; letter-spacing:-.4px; }
    .progress-wrap { margin-top:12px; }
    .progress-track { background:var(--border); border-radius:99px; height:5px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:99px; background:var(--check); transition:width .4s ease; width:0%; }
    .progress-txt { margin-top:5px; font-size:12px; color:var(--soft); font-weight:500; }

    /* BADGES */
    .badges { display:flex; gap:8px; padding:12px 16px 0; overflow-x:auto; scrollbar-width:none; }
    .badges::-webkit-scrollbar { display:none; }
    .badge {
      font-size:12px; font-weight:700; border-radius:99px; padding:5px 11px; white-space:nowrap;
    }
    .badge-streak { background:var(--streak-bg); color:var(--streak); border:1px solid #FED7AA; }
    .badge-book { background:var(--blue-bg); color:var(--blue); border:1px solid #BFDBFE; }

    /* SECTION */
    .section { margin:14px 14px 0; }
    .sec-title { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--soft); margin-bottom:7px; padding:0 2px; }
    .card { background:var(--card); border-radius:var(--r); box-shadow:var(--shadow); border:1px solid var(--border); overflow:hidden; }

    /* HABIT ROW */
    .habit-row {
      display:flex; align-items:flex-start; gap:11px;
      padding:13px 14px; cursor:pointer; user-select:none;
      border-bottom:1px solid var(--border); transition:background .12s;
    }
    .habit-row:last-child { border-bottom:none; }
    .habit-row:active { background:#F9FAFB; }
    .habit-row.done { background:#F0FDF4; }
    .habit-emoji { font-size:20px; width:26px; text-align:center; flex-shrink:0; margin-top:1px; }
    .habit-info { flex:1; min-width:0; }
    .habit-label { font-size:15px; font-weight:600; transition:color .15s; }
    .habit-row.done .habit-label { color:var(--check); }
    .habit-tasks { margin-top:5px; display:flex; flex-direction:column; gap:3px; }
    .habit-task {
      font-size:12px; color:var(--soft); display:flex; align-items:flex-start; gap:5px; line-height:1.4;
    }
    .habit-task::before { content:"→"; flex-shrink:0; opacity:.5; }
    .habit-row.done .habit-task { color:#86EFAC; }
    .habit-row.done .habit-task::before { opacity:.4; }
    .h-check {
      width:24px; height:24px; border-radius:50%; border:2px solid var(--border);
      flex-shrink:0; display:flex; align-items:center; justify-content:center;
      transition:all .2s; background:white; margin-top:1px;
    }
    .habit-row.done .h-check { background:var(--check); border-color:var(--check); }
    .h-check svg { width:11px; height:11px; opacity:0; transition:opacity .15s; }
    .habit-row.done .h-check svg { opacity:1; }

    /* WORKOUT TYPE INPUT */
    .sub-input-wrap { padding:0 14px 12px 51px; background:#F0FDF4; display:none; border-bottom:1px solid var(--border); }
    .sub-input-wrap.open { display:block; }
    .sub-input-wrap:last-child { border-bottom:none; }
    .sub-input {
      width:100%; border:1px solid #BBF7D0; border-radius:8px; padding:8px 11px;
      font-size:13px; background:white; color:var(--text); outline:none; font-family:inherit;
    }
    .sub-input:focus { border-color:var(--check); }

    /* METRIC ROWS (non-checkbox) */
    .metric-row {
      display:flex; align-items:center; gap:11px;
      padding:12px 14px; border-bottom:1px solid var(--border);
      background:var(--card);
    }
    .metric-row:last-child { border-bottom:none; }
    .metric-emoji { font-size:20px; width:26px; text-align:center; flex-shrink:0; }
    .metric-info { flex:1; }
    .metric-label { font-size:14px; font-weight:600; }
    .metric-sub { font-size:11px; color:var(--soft); margin-top:2px; }
    .metric-input {
      border:1px solid var(--border); border-radius:8px; padding:6px 10px;
      font-size:14px; font-weight:600; color:var(--blue); background:var(--blue-bg);
      text-align:center; outline:none; font-family:inherit;
    }
    .metric-input:focus { border-color:var(--blue); }
    .metric-input.wide { width:100px; }
    .metric-input.narrow { width:70px; }

    /* ARTICLE CARD */
    .article-card {
      background:var(--card); border-radius:var(--r); border:1px solid var(--border);
      box-shadow:var(--shadow); overflow:hidden;
    }
    .article-inner {
      display:flex; align-items:center; gap:12px; padding:14px;
      text-decoration:none; color:inherit;
    }
    .article-inner:active { background:#F9FAFB; }
    .article-text { flex:1; min-width:0; }
    .article-topic { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--blue); margin-bottom:3px; }
    .article-title { font-size:14px; font-weight:600; line-height:1.35; }
    .article-source { font-size:11px; color:var(--soft); margin-top:2px; }
    .article-arrow { font-size:18px; color:var(--soft); flex-shrink:0; }

    /* NOTES */
    .notes-card { background:var(--card); border-radius:var(--r); box-shadow:var(--shadow); border:1px solid var(--border); overflow:hidden; }
    .notes-input {
      width:100%; padding:14px; font-size:14px; font-family:inherit;
      color:var(--text); resize:none; outline:none; border:none;
      min-height:80px; background:transparent;
    }
    .notes-input::placeholder { color:#D1D5DB; }

    /* ALL DONE */
    .all-done {
      display:none; margin:14px; background:var(--check); color:white;
      padding:14px 16px; border-radius:var(--r); text-align:center; font-weight:700; font-size:15px;
    }
    .all-done.show { display:block; }

    /* LOADING */
    .loading {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100dvh; gap:12px; color:var(--soft); font-size:14px;
    }
    .spinner { width:26px; height:26px; border:2.5px solid var(--border); border-top-color:var(--text); border-radius:50%; animation:spin .65s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(.87)} 100%{transform:scale(1)} }
    .habit-row:active .h-check { animation:pop .18s ease; }
  </style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <span>Setting up your day…</span>
</div>

<div id="app" style="display:none">

  <div class="header">
    <div class="date-line" id="date-line"></div>
    <div class="greeting" id="greeting">Good morning, Max 👋</div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-txt" id="progress-txt">Loading…</div>
    </div>
  </div>

  <div class="badges" id="badges"></div>

  <!-- Wake time -->
  <div class="section">
    <div class="card">
      <div class="metric-row">
        <span class="metric-emoji">⏰</span>
        <div class="metric-info">
          <div class="metric-label">Wake time</div>
        </div>
        <input type="time" class="metric-input narrow" id="wake-input">
      </div>
    </div>
  </div>

  <!-- Today's read -->
  <div class="section" id="article-section">
    <div class="sec-title">📰 Today's Read</div>
    <div class="article-card" id="article-card">
      <a class="article-inner" id="article-link" href="#" target="_blank" rel="noopener">
        <div class="article-text">
          <div class="article-topic" id="article-topic">—</div>
          <div class="article-title" id="article-title">Loading…</div>
          <div class="article-source" id="article-source"></div>
        </div>
        <span class="article-arrow">→</span>
      </a>
    </div>
  </div>

  <!-- Habits injected here -->
  <div id="habit-sections"></div>

  <!-- Book tracking -->
  <div class="section">
    <div class="sec-title">📚 Books</div>
    <div class="card">
      <div class="metric-row">
        <span class="metric-emoji">💻</span>
        <div class="metric-info">
          <div class="metric-label">Code — Petzold</div>
          <div class="metric-sub" id="code-progress-sub">Pages read today</div>
        </div>
        <input type="number" class="metric-input narrow" id="pages-code-input" min="0" max="50" placeholder="0">
      </div>
    </div>
  </div>

  <!-- Screen time -->
  <div class="section">
    <div class="sec-title">📱 Screen Time</div>
    <div class="card">
      <div class="metric-row">
        <span class="metric-emoji">📱</span>
        <div class="metric-info">
          <div class="metric-label">Hours on phone today</div>
          <div class="metric-sub" id="screen-goal-sub">Goal: under 9h</div>
        </div>
        <input type="number" class="metric-input narrow" id="screen-input" min="0" max="24" step="0.5" placeholder="—">
      </div>
    </div>
  </div>

  <!-- Notes -->
  <div class="section">
    <div class="sec-title">Notes</div>
    <div class="notes-card">
      <textarea class="notes-input" id="notes-input" placeholder="How's the day going?"></textarea>
    </div>
  </div>

  <div class="all-done" id="all-done">🏆 Full day. You showed up. Proud of you.</div>

</div>

<script>
let pageId = null;
let state = {};
let cfg = {};

// Habit sections definition — tasks filled from config
const SECTIONS = [
  { title: '🌅 Morning', habits: [
    { key:'spiritual', emoji:'🙏', label:'Spiritual practice', notionKey:'🙏 Spiritual Practice' },
  ]},
  { title: '🧠 Mind', habits: [
    { key:'meditate', emoji:'🧘', label:'Meditate',          notionKey:'🧘 Meditate' },
    { key:'journal',  emoji:'📓', label:'Journal',           notionKey:'📓 Journal' },
    { key:'read',     emoji:'📖', label:'Read (Code)',        notionKey:'📖 Read' },
    { key:'learn',    emoji:'💡', label:'Learn something',    notionKey:'💡 Learned Something' },
  ]},
  { title: '💪 Body', habits: [
    { key:'workout',    emoji:'🏋️', label:'Workout',    notionKey:'🏋️ Workout', hasNote:true },
    { key:'coldShower', emoji:'🚿', label:'Cold shower', notionKey:'🚿 Cold Shower', coldOnly:true },
    { key:'eat',        emoji:'🥗', label:'Ate healthy', notionKey:'🥗 Ate Healthy' },
  ]},
  { title: '💼 Work', habits: [
    { key:'value', emoji:'💼', label:'Created value', notionKey:'💼 Created Value' },
  ]},
  { title: '🔒 Keep Clean', habits: [
    { key:'weedFree', emoji:'✊', label:'Weed-free',       notionKey:'🚫 Weed-Free' },
    { key:'phone',    emoji:'📵', label:'Phone controlled', notionKey:'📵 Phone Controlled' },
    { key:'noPorn',   emoji:'🔒', label:'No porn',          notionKey:'🚫 No Porn' },
  ]},
];

const dow = new Date().getDay(); // 0=Sun,1=Mon,...
const ALL_KEYS = SECTIONS.flatMap(s =>
  s.habits.filter(h => !h.coldOnly || [1,3,5].includes(dow)).map(h => h.key)
);

function buildUI() {
  const container = document.getElementById('habit-sections');
  SECTIONS.forEach(sec => {
    const visHabits = sec.habits.filter(h => !h.coldOnly || [1,3,5].includes(dow));
    if (!visHabits.length) return;

    const wrap = document.createElement('div');
    wrap.className = 'section';
    wrap.innerHTML = `<div class="sec-title">${sec.title}</div>`;

    const card = document.createElement('div');
    card.className = 'card';

    visHabits.forEach(h => {
      const tasks = (cfg.tasks && cfg.tasks[h.key]) || [];

      const row = document.createElement('div');
      row.className = 'habit-row';
      row.id = `row-${h.key}`;
      row.innerHTML = `
        <span class="habit-emoji">${h.emoji}</span>
        <div class="habit-info">
          <div class="habit-label">${h.label}</div>
          <div class="habit-tasks" id="tasks-${h.key}">
            ${tasks.map(t => `<div class="habit-task">${t}</div>`).join('')}
          </div>
        </div>
        <div class="h-check">
          <svg viewBox="0 0 11 11" fill="none">
            <path d="M1.5 5.5l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>`;
      row.addEventListener('click', () => toggle(h));
      card.appendChild(row);

      if (h.hasNote) {
        const iw = document.createElement('div');
        iw.className = 'sub-input-wrap';
        iw.id = 'workout-wrap';
        iw.innerHTML = `<input class="sub-input" id="workout-type" type="text" placeholder="What did you do? (e.g. Push day, Plyometrics…)">`;
        card.appendChild(iw);
      }
    });

    wrap.appendChild(card);
    container.appendChild(wrap);
  });
}

async function toggle(h) {
  const newVal = !state[h.key];
  state[h.key] = newVal;
  document.getElementById(`row-${h.key}`).classList.toggle('done', newVal);
  updateProgress();
  if (h.hasNote) document.getElementById('workout-wrap').classList.toggle('open', newVal);
  await save(h.notionKey, newVal, 'checkbox');
}

function updateProgress() {
  const total = ALL_KEYS.length;
  const done  = ALL_KEYS.filter(k => state[k]).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-txt').textContent = `${done} of ${total} done`;
  document.getElementById('all-done').classList.toggle('show', done === total && total > 0);
}

function setHeader() {
  const h = new Date().getHours();
  const g = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greeting').textContent = `${g}, Max 👋`;
  document.getElementById('date-line').textContent = new Date().toLocaleDateString('en-US', {
    weekday:'long', month:'long', day:'numeric'
  });
}

function setBadges() {
  const start = new Date('2026-03-14');
  const today = new Date(); today.setHours(0,0,0,0); start.setHours(0,0,0,0);
  const day = Math.max(1, Math.round((today-start)/86400000)+1);

  const totalPages = cfg.books && cfg.books.code ? cfg.books.code.total_pages : 699;
  const currentPage = cfg.books && cfg.books.code ? cfg.books.code.current_page : 0;
  const pct = Math.round(currentPage/totalPages*100);

  document.getElementById('badges').innerHTML = `
    <span class="badge badge-streak">🔥 Day ${day} weed-free</span>
    <span class="badge badge-book">📖 Code: ${currentPage}/${totalPages} pages (${pct}%)</span>
  `;
}

function setArticle(article) {
  if (!article) return;
  document.getElementById('article-topic').textContent = article.topic || 'Read';
  document.getElementById('article-title').textContent = article.title;
  document.getElementById('article-source').textContent = article.source;
  document.getElementById('article-link').href = article.url;
}

function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

async function save(prop, value, type) {
  if (!pageId) return;
  try {
    await fetch('/api/update', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ pageId, property:prop, value, type })
    });
  } catch(e) {}
}

async function init() {
  try {
    // Load config and today in parallel
    const [cfgRes, todayRes] = await Promise.all([
      fetch('/api/config'),
      fetch('/api/today')
    ]);
    cfg = await cfgRes.json();
    const data = await todayRes.json();
    pageId = data.pageId;

    // Set header
    setHeader();

    // Build habit UI with tasks from config
    buildUI();

    // Set article
    setArticle(cfg.article);

    // Set screen time goal label
    const goal = cfg.targets && cfg.targets.screen_time_goal_hours;
    document.getElementById('screen-goal-sub').textContent = `Goal: under ${goal || 9}h — check Settings → Screen Time`;

    // Set book sub label
    const ppd = cfg.targets && cfg.targets.pages_code_per_day || 8;
    document.getElementById('code-progress-sub').textContent = `Goal: ${ppd} pages today`;

    // Populate state
    const h = data.habits;
    state = {
      spiritual: h.spiritual, meditate: h.meditate, journal: h.journal,
      read: h.read, learn: h.learn, eat: h.eat, workout: h.workout,
      coldShower: h.coldShower, weedFree: h.weedFree, phone: h.phone,
      noPorn: h.noPorn, value: h.value,
    };

    // Render rows
    ALL_KEYS.forEach(k => {
      const el = document.getElementById(`row-${k}`);
      if (el) el.classList.toggle('done', state[k]);
    });

    // Workout note
    if (h.workout && document.getElementById('workout-wrap')) {
      document.getElementById('workout-wrap').classList.add('open');
    }
    if (h.workoutType) document.getElementById('workout-type').value = h.workoutType;

    // Other inputs
    if (h.wakeTime) document.getElementById('wake-input').value = h.wakeTime;
    if (h.pagesCode !== null) document.getElementById('pages-code-input').value = h.pagesCode || '';
    if (h.screenTime !== null) document.getElementById('screen-input').value = h.screenTime || '';
    if (h.notes) document.getElementById('notes-input').value = h.notes;

    setBadges();
    updateProgress();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    // Wire inputs
    document.getElementById('wake-input').addEventListener('change', e =>
      save('Wake Time', e.target.value, 'text'));

    const saveWorkout = debounce(v => save('Workout Type', v, 'text'), 1000);
    const woType = document.getElementById('workout-type');
    if (woType) woType.addEventListener('input', e => saveWorkout(e.target.value));

    const savePages = debounce(v => save('📖 Pages Read (Code)', parseFloat(v)||0, 'number'), 800);
    document.getElementById('pages-code-input').addEventListener('input', e => savePages(e.target.value));

    const saveScreen = debounce(v => save('📱 Screen Time (hrs)', parseFloat(v)||0, 'number'), 800);
    document.getElementById('screen-input').addEventListener('input', e => saveScreen(e.target.value));

    const saveNotes = debounce(v => save('Notes', v, 'text'), 1500);
    document.getElementById('notes-input').addEventListener('input', e => saveNotes(e.target.value));

  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="padding:40px;text-align:center;color:#6B7280">Couldn't load.<br><small>${e.message}</small></div>`;
  }
}

init();
</script>
</body>
</html>
